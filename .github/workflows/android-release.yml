name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;25.1.8937393"

      - name: Prepare signing config (optional)
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ] && [ -n "$SIGNING_STORE_PASSWORD" ] && [ -n "$SIGNING_KEY_ALIAS" ] && [ -n "$SIGNING_KEY_PASSWORD" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/ci-release.keystore"
            {
              printf '%s
' "storeFile=$GITHUB_WORKSPACE/ci-release.keystore"
              printf '%s
' "storePassword=$SIGNING_STORE_PASSWORD"
              printf '%s
' "keyAlias=$SIGNING_KEY_ALIAS"
              printf '%s
' "keyPassword=$SIGNING_KEY_PASSWORD"
            } > local.properties
            echo "Release signing config prepared from GitHub secrets."
          else
            echo "Signing secrets not found. Release build will fall back to debug signing."
          fi
            echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/ci-release.keystore"
            cat > local.properties <<EOF
            storeFile=$GITHUB_WORKSPACE/ci-release.keystore
            storePassword=$SIGNING_STORE_PASSWORD
            keyAlias=$SIGNING_KEY_ALIAS
            keyPassword=$SIGNING_KEY_PASSWORD
            EOF
            echo "Release signing config prepared from GitHub secrets."
          else
            echo "Signing secrets not found. Release build will fall back to debug signing."
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-universal
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
          if-no-files-found: error
