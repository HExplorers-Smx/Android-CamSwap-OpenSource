name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager             "platform-tools"             "platforms;android-36"             "build-tools;36.0.0"             "cmake;3.22.1"             "ndk;25.1.8937393"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK (default signing)
        run: ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-universal
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
          if-no-files-found: error
